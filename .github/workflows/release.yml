name: Build & Release

# manual trigger with a version input
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # build the 32-bit linux .so
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: install 32-bit toolchain
        run: sudo apt-get update && sudo apt-get install -y g++-multilib cmake
      - name: configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/omp-dotenv.so

  # build the 32-bit windows .dll
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: configure
        run: cmake -B build -A Win32
      - name: build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/Release/omp-dotenv.dll

  # package include + components into a zip and publish a release
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts/windows
      - name: package
        run: |
          mkdir -p package/include package/components
          cp include/omp-dotenv.inc package/include/
          cp artifacts/linux/omp-dotenv.so package/components/
          cp artifacts/windows/omp-dotenv.dll package/components/
          cd package
          zip -r "../omp-dotenv-v${{ inputs.version }}.zip" include components
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: omp-dotenv v${{ inputs.version }}
          files: omp-dotenv-v${{ inputs.version }}.zip