name: Build & Release

# manual trigger with a version input
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the v prefix (e.g. 1.0.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  # build the 32-bit linux .so
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: install 32-bit toolchain
        run: sudo apt-get update && sudo apt-get install -y g++-multilib cmake
      - name: configure
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            build/omp-dotenv.so
            build/dotenv.so

  # build the 32-bit windows .dll
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: configure
        env:
          CMAKE_POLICY_VERSION_MINIMUM: "3.5"
        run: cmake -B build -A Win32
      - name: build
        run: cmake --build build --config Release
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            build/Release/omp-dotenv.dll
            build/Release/dotenv.dll

  # package a separate zip per platform (same .inc in both) and publish a release
  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: linux
          path: artifacts/linux
      - uses: actions/download-artifact@v4
        with:
          name: windows
          path: artifacts/windows
      - name: package
        run: |
          # open.mp component -> components/, with the shared include
          mkdir -p omp/include omp/components
          cp include/omp-dotenv.inc omp/include/
          cp artifacts/linux/omp-dotenv.so omp/components/
          cp artifacts/windows/omp-dotenv.dll omp/components/
          (cd omp && zip -r "../omp-dotenv-v${{ inputs.version }}.zip" include components)
          # sa-mp legacy plugin -> plugins/, with the same shared include
          mkdir -p samp/include samp/plugins
          cp include/omp-dotenv.inc samp/include/
          cp artifacts/linux/dotenv.so samp/plugins/
          cp artifacts/windows/dotenv.dll samp/plugins/
          (cd samp && zip -r "../samp-dotenv-v${{ inputs.version }}.zip" include plugins)
      - name: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: omp-dotenv v${{ inputs.version }}
          files: |
            omp-dotenv-v${{ inputs.version }}.zip
            samp-dotenv-v${{ inputs.version }}.zip